name: Test (GPU) (RunPod)

on:
  pull_request:
    branches: [master, "js2264/*"]
  push:
    branches: [master, "js2264/*"]

# Cancel in-progress runs on the same branch to avoid resource waste.
concurrency:
  group: gpu-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:


  # ---------------------------------------------------------------------------
  # Create one pod per CUDA version, each booting with a self-registering
  # GHA runner. Pod IDs and runner labels are passed to downstream jobs via
  # job outputs.
  # ---------------------------------------------------------------------------
  start-runners:
    name: Start RunPod GPU pods
    runs-on: ubuntu-latest
    outputs:
      label-cuda12:  ${{ steps.launch.outputs.label-cuda12 }}
      pod-id-cuda12: ${{ steps.launch.outputs.pod-id-cuda12 }}
    steps:

      - name: Install runpodctl
        run: |
          mkdir -p ~/.local/bin
          wget -q https://github.com/runpod/runpodctl/releases/latest/download/runpodctl-linux-amd64 \
            -O ~/.local/bin/runpodctl
          chmod +x ~/.local/bin/runpodctl

      - name: Generate Runner Registration Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/js2264/instaGRAAL/actions/runners/registration-token \
            | jq -r '.token')
          echo "registration_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Launch pods
        id: launch
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_TEMPLATE_ID: ${{ secrets.RUNPOD_TEMPLATE_ID_CUDA_12_9_1 }}
        run: |
          LABEL="runner-${RUNPOD_TEMPLATE_ID}"
          REG_TOKEN="${{ steps.token.outputs.registration_token }}"
          ENV_JSON=$(jq -n -c \
            --arg token "$REG_TOKEN" \
            --arg label "$LABEL" \
            '{"RUNNER_TOKEN": $token, "LABEL": $label}')
          POD_JSON=$(runpodctl pod create \
            --template-id $RUNPOD_TEMPLATE_ID \
            --gpu-id "NVIDIA GeForce RTX 4090" \
            --cloud-type SECURE \
            --name "$LABEL" \
            --env "$ENV_JSON" \
            -o json)
          POD_ID=$(echo "$POD_JSON" | jq -r .id)
          echo "Created pod: $POD_ID  label: $LABEL"
          echo "label-cuda12=$LABEL"   >> "$GITHUB_OUTPUT"
          echo "pod-id-cuda12=$POD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for runners to come online
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          LABEL="${{ steps.launch.outputs.label-cuda12 }}"
          echo "Waiting for runner: $LABEL"
          STATUS=""
          for i in $(seq 1 12); do
            STATUS=$(curl -fsSL \
              -H "Authorization: Bearer $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
              | jq -r ".runners[] | select(.name == \"$LABEL\") | .status")
            if [ "$STATUS" = "online" ]; then
              echo "  $LABEL is online."
              break
            fi
            echo "  Attempt $i/12 - not online yet, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "online" ]; then
            echo "ERROR: $LABEL did not come online within 2 minutes." >&2
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Run the full test suite on each pod.
  # ---------------------------------------------------------------------------
  test-gpu:
    name: Test (CUDA ${{ matrix.cuda-version }})
    runs-on: ${{ matrix.runner-label }}
    needs: start-runners
    strategy:
      matrix:
        include:
          - cuda-version: "12.4.1"
            runner-label: ${{ needs.start-runners.outputs.label-cuda12 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install instagraal with test extras
        run: pip install ".[test]"

      - name: Run pytest (CUDA ${{ matrix.cuda-version }})
        run: pytest -v --tb=short > test-results.txt 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-runpod-cuda${{ matrix.cuda-version }}
          path: test-results.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-runpod-cuda${{ matrix.cuda-version }}
          path: |
            coverage.xml
            htmlcov/

  # ---------------------------------------------------------------------------
  # Terminate all pods - always runs, even on failure/cancellation.
  # ---------------------------------------------------------------------------
  stop-runners:
    name: Stop RunPod GPU pods
    runs-on: ubuntu-latest
    needs: [start-runners, test-gpu]
    if: always()
    steps:
      - name: Install runpodctl
        run: |
          mkdir -p ~/.local/bin
          wget -q https://github.com/runpod/runpodctl/releases/latest/download/runpodctl-linux-amd64 \
            -O ~/.local/bin/runpodctl
          chmod +x ~/.local/bin/runpodctl

      - name: Terminate pods
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          POD_ID_CUDA12:  ${{ needs.start-runners.outputs.pod-id-cuda12 }}
        run: |
          if [ -n "$POD_ID_CUDA12" ]; then
            runpodctl pod delete "$POD_ID_CUDA12"
            echo "Terminated pod: $POD_ID_CUDA12"
          fi
