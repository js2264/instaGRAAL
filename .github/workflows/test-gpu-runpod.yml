name: Test (GPU) (RunPod)

# Architecture: ephemeral RunPod pods, created fresh on every CI run.
#
# Why ephemeral instead of persistent/stopped pods:
#   RunPod does NOT reserve GPU hardware when a pod is stopped. The GPU is
#   released to other users, so resume_pod fails with "not enough free GPUs"
#   whenever hardware has been reallocated. Ephemeral pods sidestep this
#   entirely by always requesting hardware on-demand.
#
# Startup script (base64-encoded, embedded in the pod's docker_args):
#   - Runs inside the CUDA container at pod boot.
#   - Creates a non-root `runner` user.
#   - Downloads the pinned GHA runner binary to /opt/actions-runner.
#   - Registers with a unique per-run label, then calls run.sh --once.
#   - GITHUB_TOKEN, GITHUB_REPO, and RUNNER_LABEL are injected as pod env vars.
#
# Required GitHub secrets:
#   RUNPOD_API_KEY  - RunPod API key (console -> Settings -> API Keys)
#   GITHUB_TOKEN          - GitHub PAT with `repo` scope (runner registration)

on:
  pull_request:
    branches: [master, "js2264/*"]
  push:
    branches: [master, "js2264/*"]

# Cancel in-progress runs on the same branch to avoid resource waste.
concurrency:
  group: gpu-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Create one pod per CUDA version, each booting with a self-registering
  # GHA runner. Pod IDs and runner labels are passed to downstream jobs via
  # job outputs.
  # ---------------------------------------------------------------------------
  start-runners:
    name: Start RunPod GPU pods
    runs-on: ubuntu-latest
    outputs:
      label-cuda12:  ${{ steps.launch.outputs.label-cuda12 }}
      pod-id-cuda12: ${{ steps.launch.outputs.pod-id-cuda12 }}
    steps:
      - name: Install RunPod SDK
        run: pip install runpod -q

      - name: Launch pods
        id: launch
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:    ${{ github.repository }}
          RUN_ID:         ${{ github.run_id }}
          RUN_ATTEMPT:    ${{ github.run_attempt }}
        run: |
          python3 - << 'SCRIPTEOF'
          import base64, os, runpod, textwrap

          runpod.api_key = os.environ["RUNPOD_API_KEY"]

          startup = (
              "#!/bin/bash\n"
              "set -euo pipefail\n"
              "export DEBIAN_FRONTEND=noninteractive\n"
              "apt-get update -qq\n"
              "apt-get install -y -qq --no-install-recommends curl ca-certificates tar git libicu-dev jq\n"
              "rm -rf /var/lib/apt/lists/*\n"
              "id -u runner &>/dev/null || useradd -m -s /bin/bash runner\n"
              "RUNNER_DIR=/opt/actions-runner\n"
              "WORK_DIR=/tmp/runner-work\n"
              "mkdir -p \"$RUNNER_DIR\" \"$WORK_DIR\"\n"
              "chown -R runner:runner \"$RUNNER_DIR\" \"$WORK_DIR\"\n"
              "RUNNER_VERSION=2.323.0\n"
              "cd \"$RUNNER_DIR\"\n"
              "curl -fsSLo actions-runner.tar.gz \"https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz\"\n"
              "tar xzf actions-runner.tar.gz\n"
              "rm -f actions-runner.tar.gz\n"
              "chown -R runner:runner \"$RUNNER_DIR\"\n"
              "./bin/installdependencies.sh\n"
              "REG_TOKEN=$(curl -fsSL -X POST -H \"Authorization: Bearer ${GITHUB_TOKEN}\" -H \"Accept: application/vnd.github+json\" \"https://api.github.com/repos/${GITHUB_REPO}/actions/runners/registration-token\" | jq -r .token)\n"
              "su - runner -c \"\n"
              "  cd ${RUNNER_DIR}\n"
              "  ./config.sh --url https://github.com/${GITHUB_REPO} --token ${REG_TOKEN} --name ${RUNNER_LABEL} --labels ${RUNNER_LABEL} --work ${WORK_DIR} --unattended --ephemeral\n"
              "  ./run.sh --once\n"
              "\"\n"
          )

          startup_b64 = base64.b64encode(startup.encode()).decode()

          cuda_versions = [
              ("cuda12", "nvidia/cuda:12.4.1-devel-ubuntu22.04"),
          ]

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              for key, image in cuda_versions:
                  label = f"instagraal-{key}-{os.environ['RUN_ID']}-{os.environ['RUN_ATTEMPT']}"
                  pod = runpod.create_pod(
                      name=label,
                      image_name=image,
                      gpu_type_id="NVIDIA GeForce RTX 4090",
                      cloud_type="SECURE",
                      gpu_count=1,
                      container_disk_in_gb=20,
                      docker_args=f"bash -c 'echo {startup_b64} | base64 -d | bash'",
                      env={
                          "GITHUB_TOKEN": os.environ["GITHUB_TOKEN"],
                          "GITHUB_REPO":  os.environ["GITHUB_REPO"],
                          "RUNNER_LABEL": label,
                      },
                  )
                  print(f"Created {key}: pod={pod['id']} label={label}")
                  out.write(f"label-{key}={label}\n")
                  out.write(f"pod-id-{key}={pod['id']}\n")
          SCRIPTEOF

      - name: Wait for runners to come online
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for runners to register with GitHub..."
          sleep 30  # Initial delay to allow pods to boot and start the registration process.

  # ---------------------------------------------------------------------------
  # Run the full test suite on each pod.
  # ---------------------------------------------------------------------------
  test-gpu:
    name: Test (CUDA ${{ matrix.cuda-version }})
    runs-on: ${{ matrix.runner-label }}
    needs: start-runners
    strategy:
      matrix:
        include:
          - cuda-version: "12"
            runner-label: ${{ needs.start-runners.outputs.label-cuda12 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install instagraal with test extras
        run: pip install ".[test]"

      - name: Run pytest (CUDA ${{ matrix.cuda-version }})
        run: pytest -v --tb=short > test-results.txt 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-runpod-cuda${{ matrix.cuda-version }}
          path: test-results.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-runpod-cuda${{ matrix.cuda-version }}
          path: |
            coverage.xml
            htmlcov/

  # ---------------------------------------------------------------------------
  # Terminate all pods - always runs, even on failure/cancellation.
  # ---------------------------------------------------------------------------
  stop-runners:
    name: Stop RunPod GPU pods
    runs-on: ubuntu-latest
    needs: [start-runners, test-gpu]
    if: always()
    steps:
      - name: Install RunPod SDK
        run: pip install runpod -q

      - name: Terminate pods
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          POD_ID_CUDA12:  ${{ needs.start-runners.outputs.pod-id-cuda12 }}
        run: |
          python3 - << 'SCRIPTEOF'
          import runpod, os
          runpod.api_key = os.environ["RUNPOD_API_KEY"]
          for key in ("CUDA12",):
              pod_id = os.environ.get(f"POD_ID_{key}", "").strip()
              if pod_id:
                  runpod.terminate_pod(pod_id)
                  print(f"Terminated {key}: pod={pod_id}")
          SCRIPTEOF
