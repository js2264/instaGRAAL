name: Test (GPU) (RunPod)

on:
  pull_request:
    branches: [master, "js2264/*"]
  push:
    branches: [master, "js2264/*"]

# Cancel in-progress runs on the same branch to avoid resource waste.
concurrency:
  group: gpu-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:


  # ---------------------------------------------------------------------------
  # Create one pod per CUDA version, each booting with a self-registering
  # GHA runner. Pod IDs and runner labels are passed to downstream jobs via
  # job outputs.
  # ---------------------------------------------------------------------------
  start-runners:
    name: Start RunPod GPU pods
    runs-on: ubuntu-latest
    outputs:
      label:  ${{ steps.launch.outputs.label }}
      pod-id: ${{ steps.launch.outputs.pod-id }}
    steps:

      - name: Generate Runner Registration Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token \
            | jq -r '.token')
          echo "::add-mask::$TOKEN"
          echo "registration_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Launch pod
        id: launch
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          LABEL="runpod-${{ github.run_id }}"
          REG_TOKEN="${{ steps.token.outputs.registration_token }}"

          # The startup command — defined right here, no template needed
          read -r -d '' STARTUP_CMD << 'SCRIPT' || true
          bash -lc '
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends curl ca-certificates tar git
          rm -rf /var/lib/apt/lists/*
          id -u runner &>/dev/null || useradd -m -s /bin/bash runner
          RUNNER_DIR=/opt/actions-runner
          WORK_DIR=/workspace/_work
          mkdir -p "$RUNNER_DIR" "$WORK_DIR"
          chown -R runner:runner "$RUNNER_DIR" "$WORK_DIR"
          if [ ! -f "$RUNNER_DIR/config.sh" ]; then
            cd "$RUNNER_DIR"
            RUNNER_VERSION=$(curl -fsSL https://api.github.com/repos/actions/runner/releases/latest | grep -oP "\"tag_name\":\s*\"v\K[^\"]+")
            curl -fL -o actions-runner.tar.gz \
              "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"
            tar xzf actions-runner.tar.gz
            rm -f actions-runner.tar.gz
            chown -R runner:runner "$RUNNER_DIR"
          fi
          cd "$RUNNER_DIR"
          su - runner -c "
            cd $RUNNER_DIR
            ./config.sh \
              --url https://github.com/${{ github.repository }} \
              --token $RUNNER_TOKEN \
              --name $LABEL \
              --labels $LABEL \
              --work $WORK_DIR \
              --unattended --ephemeral
            ./run.sh --once
          "
          '
          SCRIPT

          # Build the GraphQL mutation using jq for proper escaping
          QUERY=$(jq -n -c \
            --arg name "$LABEL" \
            --arg image "runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04" \
            --arg gpu "NVIDIA GeForce RTX 4090" \
            --arg cmd "$STARTUP_CMD" \
            --arg token "$REG_TOKEN" \
            --arg label "$LABEL" \
            '{
              query: "mutation($input: PodFindAndDeployOnDemandInput!) { podFindAndDeployOnDemand(input: $input) { id imageName machine { gpuDisplayName } } }",
              variables: {
                input: {
                  name: $name,
                  imageName: $image,
                  gpuTypeId: $gpu,
                  cloudType: "SECURE",
                  gpuCount: 1,
                  containerDiskInGb: 20,
                  volumeInGb: 0,
                  volumeMountPath: "/workspace",
                  ports: "8888/http,22/tcp",
                  dockerArgs: $cmd,
                  env: [
                    { key: "RUNNER_TOKEN", value: $token },
                    { key: "LABEL", value: $label }
                  ]
                }
              }
            }')

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "$QUERY" \
            https://api.runpod.io/graphql)

          echo "API response: $RESPONSE"

          POD_ID=$(echo "$RESPONSE" | jq -r '.data.podFindAndDeployOnDemand.id')
          if [ -z "$POD_ID" ] || [ "$POD_ID" = "null" ]; then
            echo "ERROR: Pod creation failed"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "Created pod: $POD_ID  label: $LABEL"
          echo "label=$LABEL"   >> "$GITHUB_OUTPUT"
          echo "pod-id=$POD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for runners to come online
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          LABEL="${{ steps.launch.outputs.label }}"
          echo "Waiting for runner: $LABEL"
          STATUS=""
          for i in $(seq 1 30); do
            STATUS=$(curl -fsSL \
              -H "Authorization: Bearer $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
              | jq -r ".runners[] | select(.name == \"$LABEL\") | .status")
            if [ "$STATUS" = "online" ]; then
              echo "  $LABEL is online."
              break
            fi
            echo "  Attempt $i/30 - not online yet, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "online" ]; then
            echo "ERROR: $LABEL did not come online within 5 minutes." >&2
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Run the full test suite on each pod.
  # ---------------------------------------------------------------------------
  test-gpu:
    name: Test on RunPod GPU pods
    runs-on: ${{ needs.start-runners.outputs.label }}
    needs: start-runners
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up CUDA environment
        run: |
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDA_HOME=/usr/local/cuda" >> "$GITHUB_ENV"
          echo "CUDA_INC_DIR=/usr/local/cuda/include" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Verify CUDA toolkit
        run: nvcc --version

      - name: Install instagraal with test extras
        run: pip install ".[test]"

      - name: Run pytest
        run: pytest -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-runpod
          path: test-results.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-runpod
          path: |
            coverage.xml
            htmlcov/

  # ---------------------------------------------------------------------------
  # Terminate all pods - always runs, even on failure/cancellation.
  # ---------------------------------------------------------------------------
  stop-runners:
    name: Stop RunPod GPU pods
    runs-on: ubuntu-latest
    needs: [start-runners, test-gpu]
    if: always()
    steps:
      - name: Install runpodctl
        run: |
          mkdir -p ~/.local/bin
          wget -q https://github.com/runpod/runpodctl/releases/latest/download/runpodctl-linux-amd64 \
            -O ~/.local/bin/runpodctl
          chmod +x ~/.local/bin/runpodctl

      - name: Terminate pods
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          POD_ID: ${{ needs.start-runners.outputs.pod-id }}
        run: |
          # Always try to clean up, even if output is empty
          if [ -n "$POD_ID" ] && [ "$POD_ID" != "null" ]; then
            runpodctl pod delete "$POD_ID" || true
            echo "Terminated pod: $POD_ID"
          else
            echo "WARNING: No pod ID found — check for orphaned pods!"
          fi
