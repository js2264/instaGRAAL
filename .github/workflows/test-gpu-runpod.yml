name: Test GPU (RunPod persistent pods)

# Architecture: Pre-created persistent RunPod pods with NVIDIA CUDA images.
# Pods are STOPPED (not deleted) when idle – you pay only for volume disk
# storage (~$0.20 GB/month), never for GPU compute time between CI runs.
#
# The runner binary and its dependencies are stored on the volume disk
# (/runpod-volume/runner) so they survive stop/start cycles without
# re-downloading on every run (only the first ever start installs them).
#
# ──────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (do this once in the RunPod console or via the SDK)
# ──────────────────────────────────────────────────────────────────────────
# Create three pods – one per CUDA version – with these settings:
#
#   Images:
#     cuda11 → nvidia/cuda:11.8.0-devel-ubuntu22.04
#     cuda12 → nvidia/cuda:12.8.1-devel-ubuntu24.04
#     cuda13 → nvidia/cuda:13.2.1-devel-ubuntu24.04
#
#   Volume disk: ≥ 10 GB  (mounted at /runpod-volume)
#   Container disk: 10 GB
#
#   Docker command for each pod (set at creation time):
#
#
#     bash -lc '
#       set -euo pipefail
#
#       export DEBIAN_FRONTEND=noninteractive
#
#       apt-get update
#       apt-get install -y --no-install-recommends curl ca-certificates tar git libicu74
#       rm -rf /var/lib/apt/lists/*
#
#       # Create a non-root user for the runner
#       id -u runner &>/dev/null || useradd -m -s /bin/bash runner
#
#       RUNNER_DIR=/opt/actions-runner
#       WORK_DIR=/runpod-volume/_work
#
#       mkdir -p "$RUNNER_DIR" "$WORK_DIR"
#       chown -R runner:runner "$RUNNER_DIR" "$WORK_DIR"
#
#       # Download/extract runner if not already present
#       if [ ! -f "$RUNNER_DIR/config.sh" ]; then
#         cd "$RUNNER_DIR"
#         curl -fL -o actions-runner.tar.gz \
#           https://github.com/actions/runner/releases/download/v2.334.0/actions-runner-linux-x64-2.334.0.tar.gz
#         tar xzf actions-runner.tar.gz
#         rm -f actions-runner.tar.gz
#         chown -R runner:runner "$RUNNER_DIR"
#       fi
#
#       # Configure + run as non-root
#       cd "$RUNNER_DIR"
#
#       su - runner -c "
#         cd $RUNNER_DIR
#         ./config.sh \
#           --url https://github.com/js2264/instaGRAAL \
#           --token AEU7Y4XPBWBJ3IBSX5DR65DJ5PZGQ \
#           --name runner-cuda13.2.1 \
#           --labels runner-cuda13.2.1 \
#           --work $WORK_DIR \
#           --unattended --ephemeral
#         ./run.sh --ephemeral
#       "
#     '
#
#
#   Env vars to inject at pod creation (RunPod console → Environment Variables):
#     GITHUB_TOKEN  – GitHub PAT with repo scope (for runner registration)
#     GITHUB_REPO   – koszullab/instaGRAAL
#     RUNNER_LABEL  – instagraal-cuda11  (or cuda12 / cuda13 for the other pods)
#
# After creating the pods, store their IDs in GitHub secrets:
#   RUNPOD_POD_ID_CUDA13
#
# ──────────────────────────────────────────────────────────────────────────
# Required GitHub secrets:
#   RUNPOD_API_KEY         – RunPod API key (console → Settings → API Keys)
#   RUNPOD_POD_ID_CUDA13   – Pod ID for the CUDA 13 pod
#   GITHUB_TOKEN           – GitHub token with repo scope (runner registration)
# ──────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [master, "js2264/*"]
  push:
    branches: [master, "js2264/*"]

# Only one run may use the persistent pods at a time.
# A newer push cancels the in-progress run rather than queuing behind it.
concurrency:
  group: gpu-tests
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Wake up all three pods.  The pod's Docker command (set at creation time)
  # re-registers the GHA runner and calls run.sh --once on every boot.
  # ---------------------------------------------------------------------------
  start-runners:
    name: Start RunPod GPU pods
    runs-on: ubuntu-latest
    steps:
      - name: Install RunPod SDK
        run: pip install runpod -q

      - name: Start pods
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          POD_ID_CUDA13:  ${{ secrets.RUNPOD_POD_ID_CUDA13 }}
        run: |
          python3 << 'PYEOF'
          import runpod, os
          runpod.api_key = os.environ["RUNPOD_API_KEY"]
          for key in ("CUDA11", "CUDA12", "CUDA13"):
              pod_id = os.environ.get(f"POD_ID_{key}", "").strip()
              if pod_id:
                  runpod.start_pod(pod_id)
                  print(f"Started {key}: pod={pod_id}")
          PYEOF

      - name: Wait for all runners to come online
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Runner labels are fixed strings set at pod-creation time.
          for LABEL in instagraal-cuda11 instagraal-cuda12 instagraal-cuda13; do
            echo "Waiting for runner: $LABEL"
            STATUS=""
            for i in $(seq 1 36); do
              STATUS=$(curl -fsSL \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
                | jq -r ".runners[] | select(.name == \"$LABEL\") | .status")
              if [ "$STATUS" = "online" ]; then
                echo "  $LABEL is online."
                break
              fi
              echo "  Attempt $i/36 - not online yet, retrying in 10s..."
              sleep 10
            done
            if [ "$STATUS" != "online" ]; then
              echo "ERROR: $LABEL did not come online within 6 minutes." >&2
              exit 1
            fi
          done

  # ---------------------------------------------------------------------------
  # Run the full test suite on all three pods in parallel.
  # ---------------------------------------------------------------------------
  test-gpu:
    name: Test (CUDA ${{ matrix.cuda-version }})
    runs-on: ${{ matrix.runner-label }}
    needs: start-runners
    strategy:
      matrix:
        include:
          - cuda-version: "13"
            runner-label: runner-cuda13.2.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install instagraal with test extras
        run: pip install ".[test]"

      - name: Run pytest (CUDA ${{ matrix.cuda-version }})
        run: pytest -v --tb=short > test-results.txt 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-runpod-cuda${{ matrix.cuda-version }}
          path: test-results.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-runpod-cuda${{ matrix.cuda-version }}
          path: |
            coverage.xml
            htmlcov/

  # ---------------------------------------------------------------------------
  # Stop (not delete) all pods – always runs, even on failure/cancellation.
  # GPU billing stops immediately; only volume disk storage is charged.
  # ---------------------------------------------------------------------------
  stop-runners:
    name: Stop RunPod GPU pods
    runs-on: ubuntu-latest
    needs: [start-runners, test-gpu]
    if: always()
    steps:
      - name: Install RunPod SDK
        run: pip install runpod -q

      - name: Stop pods
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          POD_ID_CUDA13:  ${{ secrets.RUNPOD_POD_ID_CUDA13 }}
        run: |
          python3 << 'PYEOF'
          import runpod, os
          runpod.api_key = os.environ["RUNPOD_API_KEY"]
          for key in ("CUDA11", "CUDA12", "CUDA13"):
              pod_id = os.environ.get(f"POD_ID_{key}", "").strip()
              if pod_id:
                  runpod.stop_pod(pod_id)
                  print(f"Stopped {key}: pod={pod_id}")
          PYEOF
