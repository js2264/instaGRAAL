name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  docker-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t instagraal .

      - name: Run example command
        run: |
          docker run \
            -v ${{ github.workspace }}/example:/work/example \
            instagraal \
            instagraal example/data/ example/hifi_bin_0.fa out/ --cycles 3
