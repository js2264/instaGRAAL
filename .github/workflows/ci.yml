name: CI

on:
  push:
    branches: [master, "js2264/*"]
  pull_request:
    branches: [master, "js2264/*"]

permissions:
  contents: read
  packages: write

jobs:

  # ---------------------------------------------------------------------------
  # 1. Build the Docker image and release it to GHCR.
  #    Pushes the image on branch pushes; only builds (no push) on PRs so the
  #    Dockerfile is validated without polluting the registry.
  # ---------------------------------------------------------------------------
  docker:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # 2. Lightweight CPU test job on a standard GHA runner.
  #    Uses a thin in-repo pycuda stub so that `pip install .[test]` succeeds
  #    without a CUDA toolkit.  GPU tests are auto-skipped by their own guard.
  # ---------------------------------------------------------------------------
  test-cpu:
    name: Test on GHA runner (CPU only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pycuda stub
        # Installs as distribution name "pycuda" so pip considers the hard
        # dependency satisfied without needing a CUDA toolkit to compile from source.
        run: pip install ./tools/pycuda-stub/

      - name: Install instagraal with test extras
        run: pip install ".[test]"

      - name: Run pytest (GPU tests auto-skipped)
        run: pytest --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cpu
          path: test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-cpu
          path: |
            coverage.xml
            htmlcov/
